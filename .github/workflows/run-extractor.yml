name: 'Generate Rust Types'

on:
  workflow_dispatch:
    inputs:
      force_download:
        description: 'Force re-generation even if no update'
        type: boolean
        default: false
  schedule:
    # Run every hour to check for updates
    - cron: '0 * * * *'

jobs:
  generate:
    name: Generate Rust Types
    runs-on: windows-latest

    # Allow the job to push commits
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Space Engineers
        id: space-engineers
        uses: ./.github/actions/download-space-engineers
        with:
          force_download: ${{ inputs.force_download || false }}
          steam_username: ${{ secrets.STEAM_USERNAME }}
          steam_password: ${{ secrets.STEAM_PASSWORD }}
          steam_totp: ${{ secrets.STEAM_TOTP }}
          steam_vdf: ${{ secrets.STEAM_VDF }}

      # All remaining steps are skipped when the version was already processed
      - name: Setup .NET
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Visual C++ 2013 Redistributable
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          Write-Output "Installing Microsoft Visual C++ 2013 Redistributable..."
          winget install --id Microsoft.VCRedist.2013.x64 --silent --accept-package-agreements --accept-source-agreements
          Write-Output "Visual C++ 2013 Redistributable installed"

      - name: Create MDK ini and Directory.Build.props for SE path
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          $bin64 = "${{ steps.space-engineers.outputs.bin64_path }}"

          # MDK2 ini so the NuGet package can find SE
          $ini = "[mdk]`nbinarypath=$bin64"
          $ini | Out-File -FilePath "${{ github.workspace }}/codegen/mdk.local.ini" -Encoding utf8
          Write-Output "Created mdk.local.ini with binarypath=$bin64"

          # Directory.Build.props so the direct <Reference> HintPaths resolve
          $props = @"
          <Project>
            <PropertyGroup>
              <BinaryPath>$bin64</BinaryPath>
              <LangVersion>12.0</LangVersion>
            </PropertyGroup>
          </Project>
          "@
          $props | Out-File -FilePath "${{ github.workspace }}/codegen/Directory.Build.props" -Encoding utf8
          Write-Output "Wrote Directory.Build.props with BinaryPath=$bin64"

      - name: Verify SE binaries exist
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          $bin64 = "${{ steps.space-engineers.outputs.bin64_path }}"
          if (!(Test-Path "$bin64/SpaceEngineers.exe")) {
            Write-Error "SpaceEngineers.exe not found at: $bin64"
            Get-ChildItem "${{ steps.space-engineers.outputs.game_path }}" -ErrorAction SilentlyContinue | Select-Object -First 20
            exit 1
          }
          Write-Output "Verified SE binaries at: $bin64"

      - name: Build Codegen
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          dotnet build codegen/StandaloneExtractor.csproj -c Release

      - name: Run Extractor
        id: extractor
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          $bin64 = "${{ steps.space-engineers.outputs.bin64_path }}"
          $output = "${{ github.workspace }}/crate-sys/src"

          Write-Output "Space Engineers Bin64: $bin64"
          Write-Output "Build ID: ${{ steps.space-engineers.outputs.build_id }}"

          $exe = "${{ github.workspace }}/codegen/bin/Release/netframework48/StandaloneExtractor.exe"

          if (!(Test-Path $exe)) {
            Write-Error "StandaloneExtractor.exe not found at: $exe"
            exit 1
          }

          Write-Output "Running extractor..."
          $extractorOutput = & $exe --bin64 $bin64 --output $output 2>&1 | Tee-Object -Variable lines
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Extractor failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          # Parse SE version from "Extractor v<number>" line
          $versionLine = $lines | Select-String "^Extractor v(\d+)" | Select-Object -First 1
          if ($versionLine -and $versionLine.Matches[0].Groups[1].Value) {
            $rawVersion = $versionLine.Matches[0].Groups[1].Value
            # Format as dotted version: 01208015 -> 1.208.015
            # The raw int drops leading zero, so pad to 8 digits
            $padded = $rawVersion.PadLeft(8, '0')
            $seVersion = "$([int]$padded.Substring(0,2)).$($padded.Substring(2,3)).$($padded.Substring(5,3))"
            # Collapsed minor for crate versioning: major.(MMM)(PPP).patch
            # e.g. SE 1.208.015 -> crate 1.208015.N
            $seMajor = [int]$padded.Substring(0,2)
            $seCollapsed = "$($padded.Substring(2,3))$($padded.Substring(5,3))"
            Write-Output "Detected SE version: $seVersion (crate base: $seMajor.$seCollapsed)"
            Write-Output "se_version=$seVersion" >> $env:GITHUB_OUTPUT
            Write-Output "se_major=$seMajor" >> $env:GITHUB_OUTPUT
            Write-Output "se_collapsed=$seCollapsed" >> $env:GITHUB_OUTPUT

            # Diagnostics JSON files live under Bin64/SEProtoExtractor/<rawVersion>/
            $diagnosticsPath = Join-Path $bin64 "SEProtoExtractor" $rawVersion
            Write-Output "diagnostics_path=$diagnosticsPath" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not parse SE version from extractor output"
            exit 1
          }

      - name: Install Rust toolchain
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        uses: dtolnay/rust-toolchain@stable

      - name: Check for source changes
        id: changes
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          $major = "${{ steps.extractor.outputs.se_major }}"
          $collapsed = "${{ steps.extractor.outputs.se_collapsed }}"
          $prefix = "v${major}.${collapsed}."

          # Find the latest tag for this SE version
          git fetch --tags --force 2>$null
          $latestTag = $null
          $tags = git tag -l "${prefix}*"
          if ($tags) {
            $latestTag = $tags | ForEach-Object {
              if ($_ -match "\.([0-9]+)$") { [PSCustomObject]@{ Tag = $_; Patch = [int]$Matches[1] } }
            } | Sort-Object -Property Patch -Descending | Select-Object -First 1 -ExpandProperty Tag
          }

          if ($latestTag) {
            Write-Output "Comparing against last tag: $latestTag"
            $diff = git diff "$latestTag" -- crate-sys/ crate-compat/src/ crate-transport/src/ crate/src/
          } else {
            Write-Output "No previous tag for this SE version, treating as new"
            $diff = "new"
          }

          if ($diff) {
            Write-Output "Source changes detected"
            Write-Output "has_changes=true" >> $env:GITHUB_OUTPUT
            Write-Output "latest_tag=$latestTag" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "No source changes since $latestTag"
            Write-Output "has_changes=false" >> $env:GITHUB_OUTPUT
          }

      - name: Compute crate version
        id: crate-version
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          $major = "${{ steps.extractor.outputs.se_major }}"
          $collapsed = "${{ steps.extractor.outputs.se_collapsed }}"
          $latestTag = "${{ steps.changes.outputs.latest_tag }}"

          $patch = 0
          if ($latestTag -match "\.([0-9]+)$") {
            $patch = [int]$Matches[1] + 1
          }

          $crateVersion = "$major.$collapsed.$patch"
          Write-Output "Crate version: $crateVersion"
          Write-Output "crate_version=$crateVersion" >> $env:GITHUB_OUTPUT

      - name: Stamp crate versions
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.crate-version.outputs.crate_version }}"

          foreach ($toml in @("crate-compat/Cargo.toml", "crate-sys/Cargo.toml", "crate-transport/Cargo.toml", "crate/Cargo.toml")) {
            (Get-Content $toml -Raw) -replace 'version = "[\d\.]+"', "version = `"$version`"" |
              Set-Content $toml -NoNewline
          }

      - name: Verify generated code compiles
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: cargo check --workspace

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        run: |
          $seVersion = "${{ steps.extractor.outputs.se_version }}"
          $crateVersion = "${{ steps.crate-version.outputs.crate_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add crate-sys/src/types.rs crate-transport/src/protocol/ crate-compat/Cargo.toml crate-sys/Cargo.toml crate-transport/Cargo.toml crate/Cargo.toml
          git commit -m "chore: update generated types for SE v$seVersion (crate v$crateVersion)"
          git push

      - name: Publish to crates.io
        id: publish
        if: steps.changes.outputs.has_changes == 'true'
        shell: pwsh
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order
          $crates = @("crate-compat", "crate-sys", "crate-transport", "crate")
          foreach ($crate in $crates) {
            Write-Output "Publishing $crate..."
            cargo publish --manifest-path "$crate/Cargo.toml" --allow-dirty
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to publish $crate"
              exit $LASTEXITCODE
            }
            # Wait for crates.io index to update before publishing dependents
            if ($crate -ne $crates[-1]) {
              Write-Output "Waiting for crates.io index..."
              Start-Sleep -Seconds 30
            }
          }
          Write-Output "published=true" >> $env:GITHUB_OUTPUT

      - name: Tag version
        id: tag
        if: steps.publish.outputs.published == 'true'
        shell: pwsh
        run: |
          $seVersion = "${{ steps.extractor.outputs.se_version }}"
          $crateVersion = "${{ steps.crate-version.outputs.crate_version }}"
          $tag = "v$crateVersion"

          git tag $tag -m "Space Engineers v$seVersion"
          git push origin $tag
          Write-Output "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Output "Pushed tag: $tag"

      - name: Create GitHub release
        if: steps.tag.outputs.tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $seVersion = "${{ steps.extractor.outputs.se_version }}"
          $buildId = "${{ steps.space-engineers.outputs.build_id }}"
          $tag = "${{ steps.tag.outputs.tag }}"

          $diagnostics = "${{ steps.extractor.outputs.diagnostics_path }}"
          $schemaFile = Get-ChildItem "$diagnostics/schema_v*.json" | Select-Object -First 1

          gh release create $tag `
            --title "Space Engineers $tag" `
            --notes "Auto-generated types for Space Engineers v$seVersion (Steam build $buildId)." `
            --latest `
            "$schemaFile"


      - name: Save version marker to cache
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          "${{ steps.space-engineers.outputs.build_id }}" | Out-File -FilePath ".version-marker"

      - name: Cache version marker
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        uses: actions/cache/save@v4
        with:
          path: .version-marker
          key: ${{ steps.space-engineers.outputs.cache_key }}

      - name: Output summary
        if: steps.space-engineers.outputs.cache_hit != 'true' || inputs.force_download
        shell: pwsh
        run: |
          $seVersion = "${{ steps.extractor.outputs.se_version }}"
          $buildId = "${{ steps.space-engineers.outputs.build_id }}"
          $cacheKey = "${{ steps.space-engineers.outputs.cache_key }}"

          Write-Output "## Generated Types Summary" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Property | Value |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "|----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| SE Version | ``v$seVersion`` |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Build ID | $buildId |" >> $env:GITHUB_STEP_SUMMARY
          Write-Output "| Cache Key | ``$cacheKey`` |" >> $env:GITHUB_STEP_SUMMARY

          $tag = "${{ steps.tag.outputs.tag }}"
          $crateVersion = "${{ steps.crate-version.outputs.crate_version }}"
          if ($tag) {
            Write-Output "| Crate Version | ``$crateVersion`` |" >> $env:GITHUB_STEP_SUMMARY
            Write-Output "| Status | ✅ Committed and tagged ``$tag`` |" >> $env:GITHUB_STEP_SUMMARY
          } else {
            Write-Output "| Status | ⏭️ No changes (types already up to date) |" >> $env:GITHUB_STEP_SUMMARY
          }

